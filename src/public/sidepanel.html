<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Side Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      color: #1a1a1a;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #e5e5e7; }
      .card { background: #2c2c2e; border-color: #444; }
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 16px; }
    @media (prefers-color-scheme: dark) { p { color: #999; } }
    .card {
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      background: #f8f8f8;
    }
    .status { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; }
    .label { font-size: 13px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Side Panel Polyfill</h1>
  <p>The polyfill is working. This panel is rendered inside a Shadow DOM iframe.</p>
  <div class="card">
    <div class="status">
      <span class="dot"></span>
      <span class="label">Panel Active</span>
    </div>
  </div>
  <p>Replace this page with your extension's side panel content, or configure a target extension in the popup.</p>
</body>
</html>
